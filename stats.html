<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סטטיסטיקות — מעקב שעות</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0F172A;
    color: #F1F5F9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #1E293B;
    border-radius: 24px;
    padding: 40px 36px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
    border: 1px solid #334155;
    text-align: center;
  }
  .logo {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #1E3A8A, #2563EB);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    box-shadow: 0 8px 24px rgba(37,99,235,.35);
  }
  h1 {
    font-size: 17px;
    font-weight: 400;
    color: #94A3B8;
    margin-bottom: 32px;
    letter-spacing: .3px;
  }
  .stat {
    background: #0F172A;
    border-radius: 16px;
    padding: 28px 20px;
    margin-bottom: 16px;
    border: 1px solid #1E3A8A;
  }
  .stat-num {
    font-size: 64px;
    font-weight: 200;
    color: #60A5FA;
    line-height: 1;
    margin-bottom: 10px;
    font-variant-numeric: tabular-nums;
    letter-spacing: -2px;
  }
  .stat-lbl {
    font-size: 13px;
    color: #64748B;
    font-weight: 400;
  }
  .updated {
    font-size: 11px;
    color: #475569;
    margin-top: 20px;
    line-height: 1.6;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #1D4ED8;
    border: none;
    color: #fff;
    padding: 11px 24px;
    border-radius: 11px;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    margin-top: 20px;
    font-family: inherit;
    transition: opacity .2s;
  }
  .btn:hover { opacity: .88; }
  .btn:active { transform: scale(.97); }
  .loading {
    color: #475569;
    font-size: 32px;
    animation: pulse 1s ease-in-out infinite;
    font-weight: 200;
  }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12,6 12,12 16,14"/>
    </svg>
  </div>
  <h1>מעקב שעות Pro — סטטיסטיקות</h1>
  <div class="stat">
    <div class="stat-num" id="count"><span class="loading">...</span></div>
    <div class="stat-lbl">משתמשים שחיברו Google Drive</div>
  </div>
  <div class="updated" id="updated"></div>
  <br>
  <button class="btn" onclick="load()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 4v6h-6"/>
      <path d="M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/>
      <path d="M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
    רענן
  </button>
</div>

<script>
const FB = 'https://moneytime-app-f5a15-default-rtdb.firebaseio.com/ucount.json?shallow=true';

async function load() {
  document.getElementById('count').innerHTML = '<span class="loading">...</span>';
  try {
    const r = await fetch(FB);
    if (!r.ok) throw new Error('שגיאה ' + r.status);
    const data = await r.json();
    const count = data ? Object.keys(data).length : 0;
    document.getElementById('count').textContent = count;
    const now = new Date().toLocaleString('he-IL');
    document.getElementById('updated').textContent = 'עודכן: ' + now;
  } catch(e) {
    document.getElementById('count').textContent = '—';
    document.getElementById('updated').textContent = 'שגיאה: ' + e.message;
  }
}

load();
</script>
</body>
</html>
