<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מתחבר ל-Google Drive...</title>
<style>
  body{
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    direction: rtl;
  }
  .container{
    text-align: center;
    padding: 40px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .spinner{
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 20px auto;
  }
  @keyframes spin{
    to{ transform: rotate(360deg); }
  }
  h1{
    font-size: 24px;
    font-weight: 300;
    margin: 20px 0 10px;
  }
  p{
    font-size: 14px;
    opacity: 0.9;
    margin: 10px 0;
  }
  .status{
    font-size: 12px;
    margin-top: 20px;
    opacity: 0.7;
  }
  .check{
    display: none;
    font-size: 60px;
    margin: 20px auto;
  }
  .check.show{
    display: block;
    animation: checkPop 0.3s ease-out;
  }
  @keyframes checkPop{
    from{ transform: scale(0); }
    to{ transform: scale(1); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="spinner" id="spinner"></div>
  <div class="check" id="check">✓</div>
  <h1 id="title">מתחבר ל-Google Drive...</h1>
  <p id="subtitle">אנא המתן רגע</p>
  <div class="status" id="status"></div>
</div>

<script>
// Firebase Realtime Database URL
const FB_URL = 'https://moneytime-app-f5a15-default-rtdb.firebaseio.com';

// חילוץ פרמטרים גם משורת החיפוש (?) וגם מההאש (#)
var params = new URLSearchParams(window.location.search.replace(/^[#?]/, ''));
var hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));

// קבלת קוד האימות החדש (PKCE Flow)
var code = params.get('code') || hashParams.get('code');
var state = params.get('state') || hashParams.get('state') || 'anon';

// תמיכה לאחור בטוקן הישן (Implicit Flow) למקרה שצריך
var token = params.get('access_token') || hashParams.get('access_token');

function updateStatus(msg){ 
  document.getElementById('status').textContent = msg; 
}

function showSuccess(){
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('check').classList.add('show');
  document.getElementById('title').textContent = 'מחובר בהצלחה!';
  document.getElementById('subtitle').textContent = 'חוזר לאפליקציה...';
}

function fallbackRedirect(){
  showSuccess();
  setTimeout(function(){ window.location.href = 'index.html'; }, 1200);
}

if(code){
  updateStatus('מחליף קוד ל-token...');
  var safeState = state.replace(/[.#$\[\]\/]/g, '_');
  
  // 1. שמירה ב-Firebase (עבור APK polling)
  fetch(FB_URL + '/oauthTokens/' + safeState + '.json', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ code: code, state: state, ts: Date.now(), expires: Date.now() + 600000 })
  }).then(function(){ 
    updateStatus('✓ קוד נשמר ב-Firebase'); 
  }).catch(function(){});

  // 2. שליחה לחלון אב (PWA popup)
  if(window.opener && !window.opener.closed){
    try{
      window.opener.postMessage({ type: 'oauth_code', code: code, state: state }, '*');
      updateStatus('✓ קוד נשלח לאפליקציה');
      showSuccess();
      setTimeout(function(){ window.close(); }, 1500);
    }catch(e){ 
      fallbackRedirect(); 
    }
  } else {
    // 3. מצב Redirect מלא - שמור את הקוד ב-sessionStorage וחזור לאפליקציה
    try{ 
      sessionStorage.setItem('pkce_code', code); 
      sessionStorage.setItem('pkce_state', state); 
    }catch(e){}
    fallbackRedirect();
  }

} else if(token){
  // תמיכה אחורנית - במידה וקיבלנו טוקן ישיר (Implicit flow)
  updateStatus('שומר token ישן...');
  try{ 
    localStorage.setItem('gtoken', token); 
    localStorage.setItem('syen','1'); 
  }catch(e){}
  
  if(window.opener && !window.opener.closed){
    try{
      window.opener.postMessage({ type: 'oauth_token', token: token, state: state }, '*');
      showSuccess();
      setTimeout(function(){ window.close(); }, 1500);
    }catch(e){ 
      fallbackRedirect(); 
    }
  } else { 
    fallbackRedirect(); 
  }

} else {
  // שגיאה - לא התקבל כלום
  document.getElementById('title').textContent = 'ההתחברות נכשלה';
  document.getElementById('subtitle').textContent = 'לא התקבל קוד אישור מגוגל';
  document.getElementById('spinner').style.display = 'none';
  
  setTimeout(function(){
    if(window.opener && !window.opener.closed) window.close();
    else window.location.href = 'index.html';
  }, 3000);
}
</script>
</body>
</html>
