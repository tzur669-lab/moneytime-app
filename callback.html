<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מתחבר ל-Google Drive...</title>
<style>
  body{
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    direction: rtl;
  }
  .container{
    text-align: center;
    padding: 40px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .spinner{
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 20px auto;
  }
  @keyframes spin{
    to{ transform: rotate(360deg); }
  }
  h1{
    font-size: 24px;
    font-weight: 300;
    margin: 20px 0 10px;
  }
  p{
    font-size: 14px;
    opacity: 0.9;
    margin: 10px 0;
  }
  .status{
    font-size: 12px;
    margin-top: 20px;
    opacity: 0.7;
  }
  .check{
    display: none;
    font-size: 60px;
    margin: 20px auto;
  }
  .check.show{
    display: block;
    animation: checkPop 0.3s ease-out;
  }
  @keyframes checkPop{
    from{ transform: scale(0); }
    to{ transform: scale(1); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="spinner" id="spinner"></div>
  <div class="check" id="check">✓</div>
  <h1 id="title">מתחבר ל-Google Drive...</h1>
  <p id="subtitle">אנא המתן רגע</p>
  <div class="status" id="status"></div>
</div>

<script>
// Firebase Realtime Database URL
const FB_URL = 'https://moneytime-app-f5a15-default-rtdb.firebaseio.com';

// חילוץ token ו-state מה-URL
var hash = window.location.hash || window.location.search;
var params = new URLSearchParams(hash.replace(/^[#?]/, ''));
var token = params.get('access_token');
var state = params.get('state') || 'anon';

function updateStatus(msg){
  document.getElementById('status').textContent = msg;
}

function showSuccess(){
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('check').classList.add('show');
  document.getElementById('title').textContent = 'מחובר בהצלחה!';
  document.getElementById('subtitle').textContent = 'חוזר לאפליקציה...';
}

if(token){
  updateStatus('שומר את פרטי ההתחברות...');
  
  // 1. שמירה ב-localStorage (עבור PWA במקרה של redirect מלא)
  try{
    localStorage.setItem('gtoken', token);
    localStorage.setItem('syen', '1');
    localStorage.setItem('oauth_done', '1');
    updateStatus('✓ נשמר ב-localStorage');
  }catch(e){
    updateStatus('⚠ שגיאה ב-localStorage: ' + e.message);
  }
  
  // 2. שמירה ב-Firebase (עבור APK polling)
  var safeState = state.replace(/[.#$\[\]\/]/g, '_');
  fetch(FB_URL + '/oauthTokens/' + safeState + '.json', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      token: token,
      ts: Date.now(),
      // Token יימחק אוטומטית אחרי 10 דקות (אבטחה)
      expires: Date.now() + 600000
    })
  }).then(function(){
    updateStatus('✓ נשמר ב-Firebase');
  }).catch(function(e){
    updateStatus('⚠ שגיאה ב-Firebase: ' + e.message);
  });
  
  // 3. ניסיון deep link ל-APK (אם זה Capacitor)
  var deepLink = 'com.tzur669.moneytime://oauth#access_token=' + token;
  setTimeout(function(){
    try{
      window.location.href = deepLink;
      updateStatus('✓ ניסיון deep link ל-APK');
    }catch(e){
      // deep link נכשל - זה בסדר, זה אומר שאנחנו לא ב-APK
    }
  }, 500);
  
  // 4. postMessage לחלון אב (PWA popup)
  if(window.opener && !window.opener.closed){
    try{
      window.opener.postMessage({
        type: 'oauth_token',
        token: token,
        state: state
      }, '*'); // יעבוד גם ב-localhost וגם ב-production
      updateStatus('✓ נשלח ל-popup opener');
      
      // הצלחה! סגור חלון
      showSuccess();
      setTimeout(function(){
        window.close();
      }, 1500);
    }catch(e){
      updateStatus('⚠ שגיאה ב-postMessage: ' + e.message);
      // אם postMessage נכשל, נסה redirect
      fallbackRedirect();
    }
  } else {
    // אין חלון אב - כנראה redirect מלא
    updateStatus('אין popup opener - redirect מלא');
    fallbackRedirect();
  }
  
} else {
  // אין token - שגיאה או ביטול
  document.getElementById('title').textContent = 'ההתחברות נכשלה';
  document.getElementById('subtitle').textContent = 'לא התקבל access token';
  document.getElementById('spinner').style.display = 'none';
  updateStatus('⚠ נסה שוב או בדוק הרשאות');
  
  setTimeout(function(){
    if(window.opener && !window.opener.closed){
      window.close();
    } else {
      window.location.href = 'index.html';
    }
  }, 3000);
}

// fallback - חזרה לדף הראשי
function fallbackRedirect(){
  showSuccess();
  setTimeout(function(){
    window.location.href = 'index.html';
  }, 1500);
}
</script>
</body>
</html>
