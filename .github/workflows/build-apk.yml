name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # מונע לולאה אינסופית — לא רץ אם ה-commit נעשה ע"י GitHub Actions
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Prepare web assets
        run: |
          mkdir -p www
          # עדכן APP_VERSION אוטומטית: major.minor.build
          BASE_VER=$(grep -oP "APP_VERSION='\K[0-9]+\.[0-9]+" index.html || echo "2.1")
          NEW_VER="${BASE_VER}.${{ github.run_number }}"
          sed -i "s/APP_VERSION='[0-9]*\.[0-9]*\.[0-9]*'/APP_VERSION='${NEW_VER}'/" index.html
          echo "גרסה חדשה: ${NEW_VER}"
          cp index.html www/index.html
          cp sw.js www/sw.js || true
          cp manifest.json www/manifest.json || true
          cp callback.html www/callback.html || true

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Patch AndroidManifest
        run: |
          python3 << 'PYEOF'
          import re

          path = "android/app/src/main/AndroidManifest.xml"
          with open(path, "r") as f:
              content = f.read()

          # 1. כבה cleartext
          content = content.replace('android:usesCleartextTraffic="true"', 'android:usesCleartextTraffic="false"')

          # 2. deep link — הוסף לפני </activity> הראשון בלבד
          deep_link = '<intent-filter><action android:name="android.intent.action.VIEW"/><category android:name="android.intent.category.DEFAULT"/><category android:name="android.intent.category.BROWSABLE"/><data android:scheme="com.tzur669.moneytime" android:host="oauth"/></intent-filter>'
          if 'android.intent.action.VIEW' not in content:
              idx = content.find('</activity>')
              if idx != -1:
                  content = content[:idx] + deep_link + content[idx:]

          # 3. הרשאות — הוסף לפני <application אם לא קיים
          if 'REQUEST_INSTALL_PACKAGES' not in content:
              content = content.replace(
                  '<application',
                  '<uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES"/>\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>\n    <application',
                  1
              )

          # 4. FileProvider — הוסף לפני </application> אם לא קיים
          if 'FileProvider' not in content:
              provider = '<provider android:name="androidx.core.content.FileProvider" android:authorities="com.tzur669.moneytime.fileprovider" android:exported="false" android:grantUriPermissions="true"><meta-data android:name="android.support.FILE_PROVIDER_PATHS" android:resource="@xml/file_paths"/></provider>'
              content = content.replace('</application>', provider + '\n</application>', 1)

          with open(path, "w") as f:
              f.write(content)

          print("AndroidManifest patched OK")
          PYEOF

      - name: Create FileProvider paths xml
        run: |
          mkdir -p android/app/src/main/res/xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<paths>\n  <cache-path name="apk_cache" path="." />\n  <external-cache-path name="apk_external_cache" path="." />\n</paths>\n' > android/app/src/main/res/xml/file_paths.xml

      - name: Patch Android resources
        run: |
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">מעקב שעות Pro</string>|' android/app/src/main/res/values/strings.xml || true
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n  <color name="colorPrimary">#1E3A8A</color>\n  <color name="colorPrimaryDark">#0F1F4A</color>\n  <color name="colorAccent">#2563EB</color>\n</resources>\n' > android/app/src/main/res/values/colors.xml

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          echo "storeFile=$(pwd)/keystore.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Inject signing config into build.gradle
        run: |
          GRADLE="android/app/build.gradle"
          sed -i '1s|^|def keystoreProps = new Properties()\nkeystoreProps.load(new FileInputStream(rootProject.file("../keystore.properties")))\n\n|' $GRADLE
          python3 << 'PYEOF'
          import re

          with open("android/app/build.gradle", "r") as f:
              content = f.read()

          signing_block = """
              signingConfigs {
                  release {
                      storeFile file(keystoreProps['storeFile'])
                      storePassword keystoreProps['storePassword']
                      keyAlias keystoreProps['keyAlias']
                      keyPassword keystoreProps['keyPassword']
                  }
              }
          """

          if 'signingConfigs {' not in content:
              content = re.sub(r'(\s*buildTypes\s*\{)', signing_block + r'\1', content, count=1)

          if 'signingConfig signingConfigs.release' not in content:
              content = re.sub(
                  r'(buildTypes\s*\{[^}]*?release\s*\{)',
                  r'\1\n            signingConfig signingConfigs.release\n            minifyEnabled false\n            shrinkResources false',
                  content, count=1, flags=re.DOTALL
              )

          with open("android/app/build.gradle", "w") as f:
              f.write(content)

          print("build.gradle patched OK")
          PYEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Signed Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      - name: Copy APK
        run: |
          find android -name "*.apk" -type f
          cp android/app/build/outputs/apk/release/app-release.apk moneytime-pro.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moneytime-pro-apk
          path: moneytime-pro.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "מעקב שעות Pro v${{ github.run_number }}"
          body: |
            ## APK להתקנה
            1. הורד את moneytime-pro.apk
            2. שלח לפלאפון והתקן
            3. אשר "מקורות לא ידועים"
          files: moneytime-pro.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push version to Firebase
        run: |
          APP_VER=$(grep -oP "APP_VERSION='\K[0-9]+\.[0-9]+\.[0-9]+" www/index.html || echo "2.1.${{ github.run_number }}")
          NOTES="עדכון v${APP_VER}"
          curl -s -X PUT \
            "https://moneytime-app-f5a15-default-rtdb.firebaseio.com/appVersion.json" \
            -H "Content-Type: application/json" \
            -d "{"version":"${APP_VER}","build":${{ github.run_number }},"notes":"${NOTES}","ts":$(date +%s000)}" || true
