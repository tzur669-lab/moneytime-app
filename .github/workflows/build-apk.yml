name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp sw.js www/sw.js || true
          cp manifest.json www/manifest.json || true
          cp callback.html www/callback.html || true

      - name: Add Android platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Patch AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:usesCleartextTraffic="true"/android:usesCleartextTraffic="false"/' $MANIFEST || true
          sed -i 's|</activity>|<intent-filter><action android:name="android.intent.action.VIEW"/><category android:name="android.intent.category.DEFAULT"/><category android:name="android.intent.category.BROWSABLE"/><data android:scheme="com.tzur669.moneytime" android:host="oauth"/></intent-filter></activity>|' $MANIFEST || true

      - name: Patch Android resources
        run: |
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">מעקב שעות Pro<\/string>/' android/app/src/main/res/values/strings.xml || true
          cat > android/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="colorPrimary">#1E3A8A</color>
            <color name="colorPrimaryDark">#0F1F4A</color>
            <color name="colorAccent">#2563EB</color>
          </resources>
          EOF

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          echo "storeFile=$(pwd)/keystore.jks" > keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      - name: Inject signing config into build.gradle
        run: |
          GRADLE="android/app/build.gradle"

          # הוסף קריאת keystore.properties בראש הקובץ
          sed -i '1s|^|def keystoreProps = new Properties()\nkeystoreProps.load(new FileInputStream(rootProject.file("../keystore.properties")))\n\n|' $GRADLE

          # החלף את buildTypes { release { ... } } עם signing מלא
          python3 - << 'PYEOF'
          import re

          with open("android/app/build.gradle", "r") as f:
              content = f.read()

          signing_config = """
              signingConfigs {
                  release {
                      storeFile file(keystoreProps['storeFile'])
                      storePassword keystoreProps['storePassword']
                      keyAlias keystoreProps['keyAlias']
                      keyPassword keystoreProps['keyPassword']
                  }
              }
          """

          # הוסף signingConfigs לפני buildTypes
          if 'signingConfigs' not in content:
              content = content.replace('    buildTypes {', signing_config + '\n    buildTypes {')

          # הוסף signingConfig ל-release
          content = re.sub(
              r'(release\s*\{)',
              r'\1\n            signingConfig signingConfigs.release\n            minifyEnabled false\n            shrinkResources false',
              content,
              count=1
          )

          with open("android/app/build.gradle", "w") as f:
              f.write(content)

          print("build.gradle patched successfully")
          PYEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Signed Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      - name: Locate and copy APK
        run: |
          echo "=== APK files found ==="
          find android -name "*.apk" -type f
          # release חתום ישירות מ-Gradle
          cp android/app/build/outputs/apk/release/app-release.apk moneytime-pro.apk
          ls -lh moneytime-pro.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: moneytime-pro-apk
          path: moneytime-pro.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "מעקב שעות Pro v${{ github.run_number }}"
          body: |
            ## APK להתקנה
            1. הורד moneytime-pro.apk
            2. שלח לפלאפון והתקן
            3. אשר "מקורות לא ידועים"
          files: moneytime-pro.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
